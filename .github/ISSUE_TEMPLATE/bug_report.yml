name: Bug Report
description: Report a bug in phi-redactor
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please do NOT include real PHI in this report.
  - type: input
    id: version
    attributes:
      label: phi-redactor version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what happened vs what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `phi-redactor proxy start`
        2. Send a request with...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. Ensure NO real PHI is included.
      render: shell