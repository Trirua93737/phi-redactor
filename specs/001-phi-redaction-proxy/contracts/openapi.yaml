openapi: "3.1.0"
info:
  title: phi-redactor Proxy API
  version: 0.1.0
  description: |
    PHI Redaction Proxy for AI/LLM Interactions.
    Provides transparent PHI redaction between client applications and LLM APIs.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local proxy server

paths:
  # ============================================================
  # OpenAI-Compatible Proxy Endpoints
  # ============================================================
  /openai/v1/chat/completions:
    post:
      operationId: openaiChatCompletions
      summary: Proxy OpenAI chat completions with PHI redaction
      description: |
        Intercepts chat completion requests, redacts PHI from messages,
        forwards to OpenAI, and re-hydrates PHI in the response.
      tags: [OpenAI Proxy]
      parameters:
        - $ref: "#/components/parameters/XSessionId"
        - $ref: "#/components/parameters/XApiKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIChatRequest"
      responses:
        "200":
          description: Chat completion response (with PHI re-hydrated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIChatResponse"
            text/event-stream:
              schema:
                type: string
                description: SSE stream of chat completion chunks (with PHI re-hydrated)
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /openai/v1/embeddings:
    post:
      operationId: openaiEmbeddings
      summary: Proxy OpenAI embeddings with PHI redaction
      tags: [OpenAI Proxy]
      parameters:
        - $ref: "#/components/parameters/XSessionId"
        - $ref: "#/components/parameters/XApiKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIEmbeddingsRequest"
      responses:
        "200":
          description: Embeddings response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIEmbeddingsResponse"

  # ============================================================
  # Anthropic-Compatible Proxy Endpoints
  # ============================================================
  /anthropic/v1/messages:
    post:
      operationId: anthropicMessages
      summary: Proxy Anthropic messages with PHI redaction
      tags: [Anthropic Proxy]
      parameters:
        - $ref: "#/components/parameters/XSessionId"
        - name: x-api-key
          in: header
          required: true
          schema:
            type: string
          description: Anthropic API key (forwarded to upstream)
        - name: anthropic-version
          in: header
          required: true
          schema:
            type: string
            default: "2023-06-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessagesRequest"
      responses:
        "200":
          description: Messages response (with PHI re-hydrated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessagesResponse"
            text/event-stream:
              schema:
                type: string

  # ============================================================
  # Default Proxy (auto-detect or configured provider)
  # ============================================================
  /v1/chat/completions:
    post:
      operationId: defaultChatCompletions
      summary: Default provider chat completions proxy
      description: Routes to the configured default provider.
      tags: [Default Proxy]
      parameters:
        - $ref: "#/components/parameters/XSessionId"
        - $ref: "#/components/parameters/XApiKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenAIChatRequest"
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIChatResponse"
            text/event-stream:
              schema:
                type: string

  # ============================================================
  # Management API
  # ============================================================
  /api/v1/sessions:
    get:
      operationId: listSessions
      summary: List active proxy sessions
      tags: [Management]
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"

  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      summary: Get session details
      tags: [Management]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found

    delete:
      operationId: closeSession
      summary: Close a session and clean up vault entries
      tags: [Management]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Session closed

  /api/v1/audit:
    get:
      operationId: getAuditTrail
      summary: Query audit trail
      tags: [Management]
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          schema:
            type: string
          description: Filter by HIPAA category
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
                  total:
                    type: integer

  /api/v1/reports/safe-harbor:
    post:
      operationId: generateSafeHarborReport
      summary: Generate HIPAA Safe Harbor compliance report
      tags: [Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
                format:
                  type: string
                  enum: [markdown, html, pdf]
                  default: markdown
      responses:
        "200":
          description: Generated report
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: string
                    format: uuid
                  output_path:
                    type: string
                  generated_at:
                    type: string
                    format: date-time

  /api/v1/health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      tags: [Management]
      responses:
        "200":
          description: Proxy is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  version:
                    type: string
                  uptime_seconds:
                    type: number
                  active_sessions:
                    type: integer
                  providers:
                    type: object
                    additionalProperties:
                      type: boolean

  /api/v1/stats:
    get:
      operationId: getStats
      summary: Get proxy statistics
      tags: [Management]
      responses:
        "200":
          description: Current statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyStats"

  # ============================================================
  # Library API (programmatic redaction without proxy)
  # ============================================================
  /api/v1/redact:
    post:
      operationId: redactText
      summary: Redact PHI from text (library mode, no LLM proxy)
      description: |
        Direct PHI detection and redaction without proxying to an LLM.
        Useful for batch processing or integration with custom pipelines.
      tags: [Library]
      parameters:
        - $ref: "#/components/parameters/XSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedactRequest"
      responses:
        "200":
          description: Redacted text with detection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedactResponse"

  /api/v1/rehydrate:
    post:
      operationId: rehydrateText
      summary: Re-hydrate synthetic tokens back to original PHI
      tags: [Library]
      parameters:
        - $ref: "#/components/parameters/XSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, session_id]
              properties:
                text:
                  type: string
                session_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Re-hydrated text
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                  rehydrations:
                    type: integer

components:
  parameters:
    XSessionId:
      name: X-Session-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: |
        Session identifier for multi-turn conversation tracking.
        If omitted, a new session is created automatically.

    XApiKey:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: LLM provider API key (forwarded to upstream)

  schemas:
    OpenAIChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        max_tokens:
          type: integer

    OpenAIChatResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
        x_phi_redactor:
          $ref: "#/components/schemas/RedactionMetadata"

    OpenAIEmbeddingsRequest:
      type: object
      required: [model, input]
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    OpenAIEmbeddingsResponse:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
              index:
                type: integer
              embedding:
                type: array
                items:
                  type: number

    AnthropicMessagesRequest:
      type: object
      required: [model, max_tokens, messages]
      properties:
        model:
          type: string
        max_tokens:
          type: integer
        system:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
        stream:
          type: boolean
          default: false

    AnthropicMessagesResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message]
        role:
          type: string
        content:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              text:
                type: string
        stop_reason:
          type: string
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
        x_phi_redactor:
          $ref: "#/components/schemas/RedactionMetadata"

    RedactRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Text to scan for PHI
        session_id:
          type: string
          format: uuid
          description: Session for consistent identity mapping
        sensitivity:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.5
          description: Confidence threshold (lower = more aggressive redaction)
        categories:
          type: array
          items:
            type: string
          description: Specific HIPAA categories to detect (default all)

    RedactResponse:
      type: object
      properties:
        redacted_text:
          type: string
          description: Text with PHI replaced by synthetic values
        session_id:
          type: string
          format: uuid
        detections:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              original_start:
                type: integer
              original_end:
                type: integer
              synthetic_value:
                type: string
              confidence:
                type: number
              detection_method:
                type: string
        total_detections:
          type: integer
        processing_time_ms:
          type: number

    RedactionMetadata:
      type: object
      description: PHI redaction metadata appended to proxied responses
      properties:
        session_id:
          type: string
          format: uuid
        redactions_in_request:
          type: integer
        rehydrations_in_response:
          type: integer
        processing_time_ms:
          type: number
        categories_detected:
          type: array
          items:
            type: string

    SessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, expired, closed]
        provider:
          type: string
        total_requests:
          type: integer
        total_redactions:
          type: integer

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          properties:
            vault_entries:
              type: integer
            categories_detected:
              type: object
              additionalProperties:
                type: integer
            idle_timeout_seconds:
              type: integer
            expires_at:
              type: string
              format: date-time

    AuditEvent:
      type: object
      properties:
        id:
          type: integer
        session_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid
        phi_category:
          type: string
        confidence:
          type: number
        action:
          type: string
          enum: [redacted, flagged, passed, blocked]
        detection_method:
          type: string
        text_length:
          type: integer
        entry_hash:
          type: string
        previous_hash:
          type: string

    ProxyStats:
      type: object
      properties:
        uptime_seconds:
          type: number
        total_requests:
          type: integer
        total_redactions:
          type: integer
        active_sessions:
          type: integer
        redactions_by_category:
          type: object
          additionalProperties:
            type: integer
        avg_confidence:
          type: number
        avg_processing_time_ms:
          type: number
        providers_active:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              detail:
                type: string

    UpstreamError:
      description: Upstream LLM API error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              upstream_status:
                type: integer
              detail:
                type: string
