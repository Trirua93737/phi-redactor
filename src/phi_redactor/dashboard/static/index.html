<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHI Redactor Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
        .header { background: linear-gradient(135deg, #1e293b, #334155); padding: 1.5rem 2rem; border-bottom: 1px solid #475569; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header h1 span { color: #38bdf8; }
        .badge { background: #22c55e; color: #fff; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; padding: 2rem; }
        .card { background: #1e293b; border-radius: 0.75rem; padding: 1.5rem; border: 1px solid #334155; }
        .card h3 { font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .card .value { font-size: 2.25rem; font-weight: 700; color: #f8fafc; }
        .card .sub { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
        .section { padding: 0 2rem 2rem; }
        .section h2 { font-size: 1.125rem; margin-bottom: 1rem; color: #cbd5e1; }
        .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
        .bar-row { display: flex; align-items: center; gap: 0.75rem; }
        .bar-label { width: 160px; font-size: 0.8rem; color: #94a3b8; text-align: right; }
        .bar-track { flex: 1; background: #334155; border-radius: 4px; height: 24px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #38bdf8); border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-size: 0.7rem; font-weight: 600; }
        .refresh-note { text-align: center; color: #475569; font-size: 0.75rem; padding: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.625rem 1rem; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        th { color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        .hipaa-badge { display: inline-block; background: #16a34a; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>PHI</span> Redactor Dashboard</h1>
        <span class="badge" id="status-badge">LIVE</span>
    </div>

    <div class="grid" id="stats-grid">
        <div class="card">
            <h3>Active Sessions</h3>
            <div class="value" id="active-sessions">-</div>
            <div class="sub">Currently tracked sessions</div>
        </div>
        <div class="card">
            <h3>Total Redactions</h3>
            <div class="value" id="total-redactions">-</div>
            <div class="sub">PHI entities masked</div>
        </div>
        <div class="card">
            <h3>Uptime</h3>
            <div class="value" id="uptime">-</div>
            <div class="sub">Server running time</div>
        </div>
        <div class="card">
            <h3>HIPAA Status</h3>
            <div class="value"><span class="hipaa-badge">COMPLIANT</span></div>
            <div class="sub">18/18 Safe Harbor categories</div>
        </div>
    </div>

    <div class="section">
        <h2>PHI Categories Detected</h2>
        <div class="bar-chart" id="category-chart"></div>
    </div>

    <div class="section">
        <h2>Detection Methods</h2>
        <div class="bar-chart" id="method-chart"></div>
    </div>

    <div class="refresh-note">Auto-refreshes every 5 seconds</div>

    <script>
        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h}h ${m}m ${s}s`;
        }

        function renderBars(containerId, data) {
            const container = document.getElementById(containerId);
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = '<div style="color:#475569;font-size:0.85rem;">No data yet</div>';
                return;
            }
            const max = Math.max(...Object.values(data));
            container.innerHTML = Object.entries(data)
                .sort((a, b) => b[1] - a[1])
                .map(([label, count]) => {
                    const pct = max > 0 ? (count / max * 100) : 0;
                    return `<div class="bar-row">
                        <div class="bar-label">${label}</div>
                        <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${count}</div></div>
                    </div>`;
                }).join('');
        }

        async function refresh() {
            try {
                const res = await fetch('/dashboard/api/live-stats');
                const data = await res.json();
                document.getElementById('active-sessions').textContent = data.active_sessions;
                document.getElementById('total-redactions').textContent = data.total_redactions.toLocaleString();
                document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);
                renderBars('category-chart', data.categories);
                renderBars('method-chart', data.methods);
                document.getElementById('status-badge').textContent = 'LIVE';
                document.getElementById('status-badge').style.background = '#22c55e';
            } catch {
                document.getElementById('status-badge').textContent = 'OFFLINE';
                document.getElementById('status-badge').style.background = '#ef4444';
            }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
